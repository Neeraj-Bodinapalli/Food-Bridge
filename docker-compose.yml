services:
  db:
    image: postgis/postgis:16-3.4
    container_name: foodbridge-db
    environment:
      POSTGRES_USER: foodbridge
      POSTGRES_PASSWORD: foodbridge
      POSTGRES_DB: foodbridge
      # Applies only on first init of the data dir. New volume name below forces a clean init.
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      # Bumped name so `docker compose up` gets a fresh cluster (trust auth, correct roles).
      - foodbridge_pgdata_v2:/var/lib/postgresql/data

volumes:
  foodbridge_pgdata_v2:
