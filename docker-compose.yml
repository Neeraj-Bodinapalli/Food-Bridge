services:
  db:
    image: postgis/postgis:16-3.4
    container_name: foodbridge-db
    environment:
      POSTGRES_USER: foodbridge
      POSTGRES_PASSWORD: foodbridge
      POSTGRES_DB: foodbridge
      # Local dev only: avoids password/auth edge cases on Windows + existing volumes.
      POSTGRES_HOST_AUTH_METHOD: trust
    # Host 5433 avoids clashing with a local PostgreSQL install on Windows (often uses 5432).
    ports:
      - "5433:5432"
    volumes:
      - foodbridge_pgdata:/var/lib/postgresql/data

volumes:
  foodbridge_pgdata:
